dataroot: /kaggle/input/sketch2image-dataset/cufs
dataset_mode: aligned
direction: AtoB
load_size: 256
crop_size: 256
preprocess: resize_and_crop
no_flip: false
num_threads: 4

model: pix2pix
netG: unet_256
netD: pixel
norm: batch
no_dropout: false
init_type: normal
init_gain: 0.02
gan_mode: vanilla

lambda_L1: 30

batch_size: 16
n_epochs: 100
n_epochs_decay: 100
lr: 0.0002
lr_policy: step
lr_decay_iters: 50
beta1: 0.5

seed: 42

save_latest_freq: 5000
save_epoch_freq: 5
save_by_iter: false

use_wandb: true
wandb_project: sketch
print_freq: 100

num_test: 100

name: cufs_ablation_c_unet256_pixel_vanilla
checkpoints_dir: ./checkpoints