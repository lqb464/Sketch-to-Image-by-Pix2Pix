# =============================================================================
# Model 2 — Pix2Pix (UNet Generator + PatchGAN Discriminator)
# Người phụ trách: Bình
# Mô tả: Kiến trúc Pix2Pix gốc từ junyanz/pytorch-CycleGAN-and-pix2pix.
#         Generator = UNet-256, Discriminator = PatchGAN 70×70.
#         Loss = GAN loss (BCE) + λ·L1 loss.
# =============================================================================

# --- Dataset ---
dataroot: /kaggle/input/datasets/lqb464/sketch2image-dataset        # dataset do Bình chuẩn bị (10 objects)
dataset_mode: aligned
direction: BtoA                      # A = ảnh thật, B =  sketch
load_size: 256
crop_size: 256
preprocess: resize_and_crop
no_flip: false
num_threads: 2

# --- Model ---
model: pix2pix
netG: unet_256                       # UNet Generator 8 lớp
netD: basic                          # PatchGAN 70×70 (mặc định pix2pix)
norm: batch
no_dropout: false
init_type: normal
init_gain: 0.02
gan_mode: vanilla                    # BCE GAN loss (sigmoid + cross-entropy)

# --- Loss weight ---
lambda_L1: 100                       # trọng số L1 loss — giá trị chuẩn trong paper

# --- Train ---
batch_size: 4096
n_epochs: 3                          # tổng 200 epoch (3 epoch đầu warm-up)
n_epochs_decay: 197                  
lr: 0.0002
lr_policy: cosine
beta1: 0.5

# --- Reproducibility ---
seed: 42

# --- Checkpointing ---
save_latest_freq: 5000
save_epoch_freq: 20
save_by_iter: false

# --- Logging & W&B ---
use_wandb: true
wandb_project: sketch-to-image
display_freq: 400
print_freq: 100

# --- Output ---
name: m2_pix2pix_unet256_lambda100   # tên experiment
checkpoints_dir: ./checkpoints

