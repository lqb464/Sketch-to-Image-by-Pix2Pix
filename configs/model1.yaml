# Standalone U-Net config extracted from notebooks/sketch2image-unet-pretrained-9d2d92.ipynb.
# Override dataroot on CLI if your dataset is not in this local path.

dataroot: /kaggle/input/sketch2image-dataset/cufs
dataset_mode: aligned
direction: AtoB
load_size: 256
crop_size: 256
preprocess: resize_and_crop
no_flip: true
num_threads: 4

model: unet_standalone
netG: unet_128
norm: none
no_dropout: true
init_type: normal
init_gain: 0.01

loss: l1
lambda_L1: 60

batch_size: 16
n_epochs: 80
n_epochs_decay: 120
lr: 0.0001
lr_policy: linear
beta1: 0.7
seed: 2026

save_latest_freq: 5000
save_epoch_freq: 5
save_by_iter: false

use_wandb: true
wandb_project: sketch
wandb_entity: Sketch2Image
display_freq: 400
print_freq: 100

eval_test_freq: 100
eval_phase: test
num_test: 100
eval_batch_size: 1
eval_num_threads: 0
eval_num_fid_images: 100
eval_kid_subset_size: 10
eval_kid_subsets: 5

name: notebook_unet128_standalone_l1_lambda60
checkpoints_dir: ./checkpoints
