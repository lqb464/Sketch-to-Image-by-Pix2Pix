# =============================================================================
# Model 4 — Pix2Pix + VGG19 Pretrained Generator
# Mô tả: Thay UNet/ResNet Generator bằng VGGGenerator — encoder dùng
#         VGG19 pretrained trên ImageNet, decoder là 5 skip-connection blocks
#         (kiến trúc UNet-style nhưng encoder là VGG19 thay vì conv-from-scratch).
#
# Transfer Learning strategy (2 giai đoạn):
#   Giai đoạn 1 (epoch 1–50):   freeze_encoder=True  → chỉ train decoder + D
#                                 lr = 0.0002, batch = 4
#   Giai đoạn 2 (epoch 51–100): freeze_encoder=False → unfreeze toàn bộ, fine-tune
#                                 lr = 0.00005 (nhỏ hơn để bảo vệ pretrained weights)
#
# Để chạy giai đoạn 2: copy config này, đặt tên m4_vgg_finetune.yaml,
#   bật continue_train: true, đổi freeze_encoder: false, lr: 0.00005
# =============================================================================

# --- Dataset ---
dataroot: ./datasets/sketch10        # đường dẫn local; trên Kaggle dùng đường dẫn kagglehub
dataset_mode: aligned                # ảnh đôi A|B ghép ngang
direction: BtoA                      # A = ảnh thật, B = sketch → sinh ảnh thật từ sketch
load_size: 256                       # KHÔNG resize_and_crop vì VGG nhạy cảm với spatial info
crop_size: 256
preprocess: resize_and_crop
no_flip: false                       # random horizontal flip (augmentation nhẹ)
num_threads: 2

# --- Model ---
model: pix2pix
netG: vgg                            # VGG19 pretrained encoder + skip-connection decoder
netD: basic                         # PatchGAN 70×70 — giữ nguyên như pix2pix gốc
norm: batch                          # BatchNorm — ổn định hơn InstanceNorm với VGG decoder
no_dropout: false                    # bật Dropout trong decoder (regularization)
init_type: normal
init_gain: 0.02
gan_mode: vanilla                    # BCE GAN loss

# --- Transfer Learning ---
freeze_encoder: true                 # True = chỉ train decoder + D (giai đoạn 1)
                                     # False = fine-tune toàn bộ encoder + decoder (giai đoạn 2)

# --- Loss weight ---
lambda_L1: 100                       # trọng số L1 loss — giữ chuẩn pix2pix paper

# --- Train ---
batch_size: 4                        # VGG encoder nặng hơn UNet; giảm xuống 2 nếu OOM
n_epochs: 50                         # giai đoạn 1: 50 epoch freeze encoder
n_epochs_decay: 50                   # decay lr tuyến tính → tổng 100 epoch
lr: 0.0002                           # lr cho giai đoạn 1 (encoder bị freeze → an toàn)
lr_policy: linear
beta1: 0.5

# --- Reproducibility ---
seed: 42

# --- Checkpointing ---
save_latest_freq: 5000
save_epoch_freq: 10                  # lưu thường xuyên hơn ResNet vì dễ diverge
save_by_iter: false
continue_train: false                # bật khi resume từ checkpoint

# --- Logging & W&B ---
use_wandb: true
wandb_project: sketch-to-image
display_freq: 400
print_freq: 100

# --- Output ---
name: m4_vgg_pretrained_frozen       # tên experiment giai đoạn 1
checkpoints_dir: ./checkpoints

# =============================================================================
# Ablation variants:
#
#   m4_vgg_finetune (giai đoạn 2 — unfreeze toàn bộ):
#       name: m4_vgg_pretrained_finetune
#       freeze_encoder: false
#       lr: 0.00005               # lr nhỏ để tránh phá vỡ pretrained weights
#       continue_train: true
#       epoch: latest             # load từ checkpoint m4_vgg_pretrained_frozen
#
#   m4_vgg_frozen_full (freeze encoder suốt 200 epoch):
#       freeze_encoder: true
#       n_epochs: 100
#       n_epochs_decay: 100
#       lr: 0.0002
#
#   m4_vgg_lsgan (thay GAN loss):
#       gan_mode: lsgan
#
#   m4_vgg_lambda50 (giảm L1 weight):
#       lambda_L1: 50
#
#   m4_vgg_batch2 (nếu OOM trên T4):
#       batch_size: 2
# =============================================================================