# Config baseline cho dataset: facades
# Quy ước tên: <dataset>_<model>_<thay_đổi>_<ngày>

dataset: facades
dataroot: /kaggle/input/datasets/lqb464/sketch2image-dataset/facades
name: facades_unet256_lambda100_0610
model: pix2pix
direction: BtoA

# Model
netG: unet_256
netD: basic
lambda_L1: 100

# Training
seed: 42
batch_size: 16
lr: 0.0004
n_epochs: 100
n_epochs_decay: 100
num_threads: 8
load_size: 256
crop_size: 256

# Logging
use_wandb: true
no_html: true
print_freq: 500
display_freq: 1000
save_latest_freq: 5000
save_epoch_freq: 5

# Testing
num_test: 20
